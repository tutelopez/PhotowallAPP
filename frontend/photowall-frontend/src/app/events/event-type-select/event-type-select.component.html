<div class="container mt-4">
  <h3>Selecciona el tipo de evento</h3>

  <div class="row mt-3">
    <div class="col-md-4 mb-3" *ngFor="let event of eventTypes">
      <div class="card h-100" (click)="selectType(event.value)" style="cursor:pointer">
        <div class="card-body text-center">
          <h5 class="card-title">{{ event.label }}</h5>
        </div>
      </div>
    </div>
  </div>
</div>
