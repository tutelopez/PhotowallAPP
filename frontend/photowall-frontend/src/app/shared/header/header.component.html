<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/">PhotoWall</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">
        <!-- Mostrar si NO hay usuario logueado -->
        <ng-container *ngIf="!user">
          <li class="nav-item"><a class="nav-link" routerLink="/register-organizer">Registrarse</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/login-organizer">Iniciar Sesión</a></li>
        </ng-container>

        <!-- Mostrar si hay usuario logueado -->
        <ng-container *ngIf="user">
          <li class="nav-item nav-link">Hola, {{ user.name }}</li>
          <li class="nav-item">
            <button class="btn btn-outline-danger btn-sm" (click)="logout()">Cerrar sesión</button>
          </li>
        </ng-container>
      </ul>
    </div>
  </div>
</nav>
