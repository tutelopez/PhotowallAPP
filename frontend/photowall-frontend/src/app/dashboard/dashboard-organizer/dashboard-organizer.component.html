<div class="container mt-4">
  <h2 *ngIf="user">Bienvenido, {{ user.name }}</h2>

  <!-- Botón Crear Evento -->
<button class="btn btn-primary" routerLink="/organizer/events/create">
  Crear Evento
</button>


  <!-- Lista de eventos -->
<!-- GRID DE CARDS -->
  <div class="row g-4" *ngIf="events.length > 0">

    <div class="col-md-4" *ngFor="let event of events">
      <div class="card shadow-sm h-100">

        <!-- COVER -->
        <div
          class="position-relative"
          style="height: 140px; overflow: hidden;"
        >
          <img
            [src]="event.coverImage || defaultCover"
            class="w-100 h-100 object-fit-cover"
          />

          <!-- PROFILE IMAGE -->
          <img
            [src]="event.profileImage || defaultProfile"
            class="rounded-circle border border-white position-absolute"
            style="
              width: 64px;
              height: 64px;
              bottom: -32px;
              left: 16px;
              object-fit: cover;
              background: #fff;
            "
          />
        </div>

        <div class="card-body pt-4">
          <h6 class="fw-bold mb-1">{{ event.name }}</h6>
          <small class="text-muted">
            {{ event.date | date:'longDate' }}
          </small>

          <div class="mt-3">
            <button
              class="btn btn-sm btn-outline-primary w-100"
              [routerLink]="['/organizer/events', event._id, 'manage']"
            >
              Gestionar evento
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
