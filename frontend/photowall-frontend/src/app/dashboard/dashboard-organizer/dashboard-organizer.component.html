<div class="container mt-4">
  <h2 *ngIf="user">Bienvenido, {{ user.name }}</h2>

  <!-- Botón Crear Evento solo si no hay eventos -->
  <div class="mb-4" *ngIf="events.length === 0">
    <button class="btn btn-primary" (click)="createEvent()">Crear Evento</button>
  </div>

  <!-- Lista de eventos -->
  <div *ngIf="events.length > 0">
    <h4>Tus Eventos</h4>
    <ul class="list-group">
      <li class="list-group-item" *ngFor="let event of events">
        {{ event.name }} - {{ event.date | date:'short' }}
        <button class="btn btn-sm btn-success ms-2" (click)="manageEvent(event._id)">Gestionar</button>
      </li>
    </ul>
  </div>
</div>
