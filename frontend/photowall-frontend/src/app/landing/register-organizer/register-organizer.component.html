<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">Registro de Organizador</h3>


          <form [formGroup]="registerForm" (ngSubmit)="register()">

            <!-- Nombre -->
            <div class="mb-3">
              <label for="name" class="form-label">Nombre</label>
              <input
                type="text"
                id="name"
                class="form-control"
                formControlName="name"
                placeholder="Tu nombre completo">
              <div *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched"
                   class="text-danger small mt-1">
                El nombre es obligatorio
              </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label">Correo electrónico</label>
              <input
                type="email"
                id="email"
                class="form-control"
                formControlName="email"
                placeholder="tu@email.com">
              <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
                   class="text-danger small mt-1">
                Ingresa un email válido
              </div>
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input
                type="password"
                id="password"
                class="form-control"
                formControlName="password"
                placeholder="Mínimo 6 caracteres">
              <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
                   class="text-danger small mt-1">
                La contraseña debe tener al menos 6 caracteres
              </div>
            </div>

            <button class="btn btn-primary w-100" type="submit" [disabled]="registerForm.invalid">
              Registrarse
            </button>
          </form>

          <p class="mt-3 text-center">
            ¿Ya tienes cuenta?
            <a routerLink="/login">Inicia sesión</a>
          </p>
        </div>
      </div>

    </div>
  </div>
</div>
